# ==========================================================
# NOMENCLATURA DESCRITIVA DO EXPERIMENTO
# ==========================================================
experiment_name: ana_inputs
description: exp 23 from old repository with ana data files and new stations
model_name: model_ana_inputs.pth

# ==========================================================
# CONFIGURAÇÕES DE ESTAÇÕES E ATRIBUTOS ESTÁTICOS
# ==========================================================
stations: [10100000, 13150003, 14100000, 16030000]

# Metadados auxiliares de cada estação (usados no pré-processamento ANA)
station_metadata:
  10100000: {flow_type: vazao, precip_id: 469001}
  13150003: {flow_type: vazao, precip_id: 463001}
  14100000: {flow_type: vazao, precip_id: 360001}
  16030000: {flow_type: vazao, precip_id: 358000}

# Chaves de atributos estáticos
#static_keys:
#  - area
#  - elev_mean
#  - slope_mean
#  - AI_mean

#static_attributes:
#  10100000: {...}
#  13150003: {...}
#  14100000: {...}
#  16030000: {...}

# ==========================================================
# CONFIGURAÇÕES DE JANELAS (DATASET CREATION)
# ==========================================================
horizon: 15

# Janelas únicas aplicadas a TODAS as estações.
# Todas as estações veem todas as features (sem hierarquia espacial, sem travel_time).
flow_window_config:
  encoder: {start: -30, end: -1}
  decoder: {start: -30, end: -1}

climate_window_config:
  encoder: {start: -30, end: -1}
  decoder: {start: -30, end: 14}

temporal_features: [day_sin, day_cos, month_sin, month_cos]

# ==========================================================
# ENGENHARIA DE FEATURES (FEATURE_WINDOWS)
# ==========================================================
api_k_list: [0.70, 0.80, 0.85, 0.90, 0.92, 0.95]
precipitation_ma: [3, 7, 15]
precipitation_cum: [3, 5, 7, 10]
evapotranspiration_ma: [7, 14, 30]
anomaly_ma: [3, 7]
forecast_ma: [3, 7, 15]
forecast_cum: [3, 5, 7, 10]

# ==========================================================
# INFERÊNCIA E SPLIT
# ==========================================================
reference_dates: ['2026-03-16']

split_config:
  train_ratio: 0.85
  val_ratio: 0.10
  test_ratio: 0.05
  gap: 128
  window_stride: 1
