# Configurações de janelas para fluxo
flow_window_config:
  10100000:
    encoder:
      - source: 10100000
        start: -365
        end: -1
        travel_time: 0
    decoder:
      - source: 10100000
        start: -90
        end: -1
        travel_time: 0
  13150000:
    encoder:
      - source: 10100000
        start: -365
        end: -1
        travel_time: 7
      - source: 13150000
        start: -365
        end: -1
        travel_time: 0
    decoder:
      - source: 10100000
        start: -90
        end: -1
        travel_time: 7
      - source: 13150000
        start: -90
        end: -1
        travel_time: 0
  14100000:
    encoder:
      - source: 10100000
        start: -365
        end: -1
        travel_time: 15
      - source: 13150000
        start: -365
        end: -1
        travel_time: 8
      - source: 14100000
        start: -365
        end: -1
        travel_time: 0
    decoder:
      - source: 10100000
        start: -120
        end: -1
        travel_time: 15
      - source: 13150000
        start: -120
        end: -1
        travel_time: 8
      - source: 14100000
        start: -120
        end: -1
        travel_time: 0

# Configurações de janelas para clima
climate_window_config:
  10100000:
    encoder: [-365, -1]
    decoder: [-90, 17]
  13150000:
    encoder: [-365, -1]
    decoder: [-90, 17]
  14100000:
    encoder: [-365, -1]
    decoder: [-90, 17]

# Features temporais
temporal_features:
  - day_sin
  - day_cos
  - month_sin
  - month_cos

# Estações principais
stations: [10100000, 13150000, 14100000]

# Chaves de atributos estáticos
static_keys:
  - area
  - elev_mean
  - slope_mean
  - AI_mean

# Atributos estáticos das estações
static_attributes:
  10100000:
    area: 100.5
    elev_mean: 250.0
    slope_mean: 2.5
    AI_mean: 1.8
  13150000:
    area: 150.2
    elev_mean: 300.0
    slope_mean: 3.0
    AI_mean: 2.0
  14100000:
    area: 200.8
    elev_mean: 350.0
    slope_mean: 3.5
    AI_mean: 2.2
    
# Janelas para features (SEÇÃO OBRIGATÓRIA para config_loader.py)
feature_windows:
  # Valores de k para API (OBRIGATÓRIO)
  api_k_list: [0.70, 0.80, 0.85, 0.90, 0.92, 0.95]
  
  # Médias móveis de precipitação (OBRIGATÓRIO)
  precipitation_ma: [3, 7, 15]
  
  # Acumulados de precipitação (OBRIGATÓRIO)
  precipitation_cum: [3, 5, 7, 10]
  
  # Médias móveis de evapotranspiração (OBRIGATÓRIO)
  evapotranspiration_ma: [7, 14, 30]
  
  # Médias móveis de anomalias (OBRIGATÓRIO)
  anomaly_ma: [3, 7]
  
  # Opcionais (se não definidos, usam os mesmos valores de precipitação)
  forecast_ma: [3, 7, 15]      # Opcional
  forecast_cum: [3, 5, 7, 10]  # Opcional

# Configurações de split (train/val/test)
split_config:
  # Proporções devem somar 1.0 (OBRIGATÓRIO)
  train_ratio: 0.95    # 95% para treino
  val_ratio: 0.025     # 2.5% para validação
  test_ratio: 0.025    # 2.5% para teste
  
  # Gap entre conjuntos (em dias) (OBRIGATÓRIO)
  gap: 128
  
  # Stride para janelas deslizantes (OBRIGATÓRIO)
  window_stride: 1

# Caminhos dos dados
data_paths:
  complete_series_dir: "data/complete_series"
  processed_dir: "data/processed"
  models_dir: "data/models"

# Configurações do modelo
model_config:
  train_test_split: 0.8
  validation_split: 0.2
  random_seed: 42