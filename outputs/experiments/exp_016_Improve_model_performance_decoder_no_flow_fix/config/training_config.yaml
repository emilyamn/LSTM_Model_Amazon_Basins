# Parâmetros de treino
epochs: 50
batch_size: 64
learning_rate: 0.001
weight_decay: 0.0001
clip_grad_norm: 3.0

# Teacher forcing
teacher_forcing:
  initial: 0.25
  decay: 0.88
  final: 0.0
  free_run_tail: 0
  early_free_run_patience: 3

# Pesos da loss
loss_weights:
  smooth: 0.0
  negative: 0.01
  continuity: 0.001
  slope: 0.3
  gate_bias: 0.3
  direction: 1.0

# Pesos por horizonte
horizon_weights:
  mode: "increasing"
  gamma: 0.03

# Parâmetros de direção
direction:
  start: 0
  weight_gamma: 0.05

# Gate decay
gate_decay: 0.06

# Early stopping
early_stopping:
  patience: 20
  min_delta: 0.0001

# Scheduler
scheduler:
  patience: 6
  factor: 0.7