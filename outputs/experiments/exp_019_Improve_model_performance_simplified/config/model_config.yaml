# Arquitetura do modelo
architecture:
  hidden_dim: 128
  num_layers: 2
  dropout: 0.3
  attention: true
  residual: true
  non_negative: false

# Parâmetros do gate
gate:
  y_prev: false
  from_inputs: true
  clamp_by_ceiling: false
  ceiling_min: 0.15
  detach_y_prev: true
  min: 0.10
  max: 0.35

# Regularização e dropout
regularization:
  input_noise_std: 0.03
  y_prev_dropout_p: 0.30
  y_prev_mask_p: 0.30
  y_prev_mask_step_gamma: 0.20
  decoder_feat_dropout_p: 0.10
  tf_step_decay: 0.10

# Outras configurações
misc:
  device: "cuda"  # será detectado automaticamente se "auto"