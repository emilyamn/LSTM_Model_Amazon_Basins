  - '2026-03-16'
  split_config:
    train_ratio: 0.85
    val_ratio: 0.1
    test_ratio: 0.05
    gap: 128
    window_stride: 1
model:
  architecture:
    hidden_dim: 256
    num_layers: 3
    dropout: 0.2
    attention: true
    residual: true
    non_negative: false
  gate:
    y_prev: true
    from_inputs: true
    clamp_by_ceiling: false
    ceiling_min: 0.15
    detach_y_prev: true
    min: 0.1
    max: 0.6
  regularization:
    input_noise_std: 0.05
    y_prev_dropout_p: 0.3
    y_prev_mask_p: 0.3
    y_prev_mask_step_gamma: 0.2
    decoder_feat_dropout_p: 0.15
    tf_step_decay: 0.15
  misc:
    device: cuda
training:
  epochs: 50
  batch_size: 64
  learning_rate: 0.001
  weight_decay: 0.0001
  clip_grad_norm: 3.0
  teacher_forcing:
    initial: 0.25
    decay: 0.88
    final: 0.0
    free_run_tail: 0
    early_free_run_patience: 3
  loss_weights:
    smooth: 0.0
    negative: 0.01
    continuity: 0.001
    slope: 0.3
    gate_bias: 0.05
    direction: 0.3
  horizon_weights:
    mode: increasing
    gamma: 0.03
  direction:
    start: 0
    weight_gamma: 0.05
  gate_decay: 0.06
  early_stopping:
    patience: 20
    min_delta: 0.0001
  scheduler:
    patience: 6
    factor: 0.7
