# Parâmetros de treino
epochs: 30
batch_size: 64
learning_rate: 0.001
weight_decay: 0.0001
clip_grad_norm: 3.0

# Teacher forcing
teacher_forcing:
  initial: 0.60
  decay: 0.94
  final: 0.0
  free_run_tail: 8
  early_free_run_patience: null

# Pesos da loss
loss_weights:
  smooth: 0.001
  negative: 0.01
  continuity: 0.002
  slope: 1.0
  gate_bias: 0.01
  direction: 0.02

# Pesos por horizonte
horizon_weights:
  mode: "increasing"
  gamma: 0.03

# Parâmetros de direção
direction:
  start: 5
  weight_gamma: 0.05

# Gate decay
gate_decay: 0.06

# Early stopping
early_stopping:
  patience: 20
  min_delta: 0.0001

# Scheduler
scheduler:
  patience: 6
  factor: 0.7