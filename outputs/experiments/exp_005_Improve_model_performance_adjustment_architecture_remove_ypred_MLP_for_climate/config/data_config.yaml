# ==========================================================
# NOMENCLATURA DESCRITIVA DO EXPERIMENTO 
# ==========================================================
experiment_name: adjustment_architecture_remove_ypred_MLP_for_climate
description: y_prev removido da entrada do LSTM — o decoder agora recebe apenas [dec_dyn, dec_temp] (55 features ao invés de 58). y_prev continua usado na conexão residual (base_pred = y_prev + delta_t) e no gate. Climate skip connection adicionada — nova climate_proj MLP que mapeia features climáticas diretamente para delta_t, sem passar pelo gargalo do LSTM
model_name: model_remove_ypred_MLP_for_climate

# ==========================================================
# CONFIGURAÇÕES DE ESTAÇÕES E ATRIBUTOS ESTÁTICOS
# ==========================================================
stations: [10100000, 13150000, 14100000]

# Chaves de atributos estáticos
static_keys:
  - area
  - elev_mean
  - slope_mean
  - AI_mean

static_attributes:
  10100000: {"area": 985960.227, "elev_mean": 1169.482, "slope_mean": 11.98, "AI_mean": 16705.015625}
  13150000: {"area": 1228406.577, "elev_mean": 977.5172, "slope_mean": 10.66077, "AI_mean": 18044.228516}
  14100000: {"area": 2204799.054, "elev_mean": 11.98524, "slope_mean": 8.19661, "AI_mean": 18840.925781}

# ==========================================================
# CONFIGURAÇÕES DE JANELAS (DATASET CREATION)
# ==========================================================
horizon: 15

flow_window_config:
  10100000:
    encoder:
      - {source: 10100000, start: -30, end: -1, travel_time: 0}
    decoder:
      - {source: 10100000, start: -30, end: -1, travel_time: 0}
  13150000:
    encoder:
      - {source: 10100000, start: -23, end: -1, travel_time: 7}
      - {source: 13150000, start: -30, end: -1, travel_time: 0}
    decoder:
      - {source: 10100000, start: -23, end: -1, travel_time: 7}
      - {source: 13150000, start: -30, end: -1, travel_time: 0}
  14100000:
    encoder:
      - {source: 10100000, start: -15, end: -1, travel_time: 15}
      - {source: 13150000, start: -22, end: -1, travel_time: 8}
      - {source: 14100000, start: -30, end: -1, travel_time: 0}
    decoder:
      - {source: 10100000, start: -15, end: -1, travel_time: 15}
      - {source: 13150000, start: -22, end: -1, travel_time: 8}
      - {source: 14100000, start: -30, end: -1, travel_time: 0}

climate_window_config:
  10100000: {encoder: [-30, -1], decoder: [-30, 14]}
  13150000: {encoder: [-30, -1], decoder: [-30, 14]}
  14100000: {encoder: [-30, -1], decoder: [-30, 14]}

temporal_features: [day_sin, day_cos, month_sin, month_cos]

# ==========================================================
# ENGENHARIA DE FEATURES (FEATURE_WINDOWS)
# ==========================================================
api_k_list: [0.70, 0.80, 0.85, 0.90, 0.92, 0.95]
precipitation_ma: [3, 7, 15]
precipitation_cum: [3, 5, 7, 10]
evapotranspiration_ma: [7, 14, 30]
anomaly_ma: [3, 7]
forecast_ma: [3, 7, 15]
forecast_cum: [3, 5, 7, 10]

# ==========================================================
# INFERÊNCIA E SPLIT
# ==========================================================
reference_dates: ['2026-03-16']

split_config:
  train_ratio: 0.85
  val_ratio: 0.10
  test_ratio: 0.05
  gap: 128
  window_stride: 1